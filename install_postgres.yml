- name: Install and configure PostgreSQL on backend
  hosts: backend
  become: yes

  vars:
    db_name: dbfapp
    db_user: dbfuser
    db_password: "AppieEnYusuf!"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install PostgreSQL and required packages
      apt:
        name:
          - postgresql
          - postgresql-contrib
        state: present

    - name: Ensure PostgreSQL is running
      service:
        name: postgresql
        state: started
        enabled: true

    - name: Allow PostgreSQL to listen on all addresses
      lineinfile:
        path: /etc/postgresql/14/main/postgresql.conf
        regexp: '^#?listen_addresses'
        line: "listen_addresses = '*'"
      notify: restart postgres

    - name: Allow frontend subnet in pg_hba.conf
      lineinfile:
        path: /etc/postgresql/14/main/pg_hba.conf
        line: "host all all 10.0.1.0/24 md5"
      notify: restart postgres

    - name: Restart PostgreSQL before database setup
      meta: flush_handlers

    - name: Create database if it does not exist
      shell: |
        sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" | grep -q 1 || sudo -u postgres createdb {{ db_name }}
      args:
        executable: /bin/bash

    - name: Create user if it does not exist
      shell: |
        sudo -u postgres psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ db_user }}'" | grep -q 1 || sudo -u postgres psql -c "CREATE USER {{ db_user }} WITH PASSWORD '{{ db_password }}';"
      args:
        executable: /bin/bash

    - name: Grant privileges on database
      shell: |
        sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_user }};"
      args:
        executable: /bin/bash

  handlers:
    - name: restart postgres
      service:
        name: postgresql
        state: restarted