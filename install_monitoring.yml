- name: Install Prometheus and Grafana on frontend
  hosts: frontend
  become: yes

  tasks:
    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Create Prometheus config directory
      file:
        path: /opt/prometheus
        state: directory
        mode: '0755'

    - name: Create Prometheus config file
      copy:
        dest: /opt/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s

          scrape_configs:
            - job_name: 'frontend'
              static_configs:
                - targets: ['10.0.1.4:9100']

            - job_name: 'backend'
              static_configs:
                - targets: ['10.0.2.4:9100']

    - name: Run Prometheus container
      community.docker.docker_container:
        name: prometheus
        image: prom/prometheus:latest
        state: started
        restart_policy: always
        published_ports:
          - "9090:9090"
        volumes:
          - /opt/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    - name: Run Grafana container
      community.docker.docker_container:
        name: grafana
        image: grafana/grafana-oss:latest
        state: started
        restart_policy: always
        published_ports:
          - "3000:3000"

